name: Tauri CI — build all platforms (Bun)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    env:
      NODE_VERSION: "latest"
      BUN_VERSION: "latest"
      RUST_TOOLCHAIN: "stable"
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config \
            build-essential \
            curl \
            unzip \
            python3 \
            ca-certificates
          sudo apt-get clean

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install -y openssl

      - name: Debug versions
        run: |
          node -v
          bun -v
          rustc -V
          cargo -V

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}

      - name: Build Tauri app (Linux)
        if: runner.os == 'Linux'
        run: bun tauri build --bundles deb,appimage
        env:
          CI: "true"
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}

      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        run: bun tauri build --bundles dmg
        env:
          CI: "true"
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        run: bun tauri build --bundles msi,nsis
        env:
          CI: "true"
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}

      - name: Debug bundle files
        shell: bash
        run: |
          find src-tauri/target/release/bundle -maxdepth 6 -print || true

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*

  release:
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Debug downloaded artifacts
        run: |
          find dist -maxdepth 8 -type f -print || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Tauri Release ${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}