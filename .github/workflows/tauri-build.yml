name: Tauri CI — build all platforms (Bun)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # нужно для публикации релизов

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      NODE_VERSION: "22"
      RUST_TOOLCHAIN: "stable"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux deps
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config \
            build-essential \
            curl \
            unzip \
            python3 \
            ca-certificates
          sudo apt-get clean

      # macOS deps
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gtk+3 librsvg pkg-config openssl

      # Windows deps
      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y visualstudio2022buildtools
          choco install -y openssl
        shell: powershell

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build
        # если фронт лежит не в корне — добавь cd

      - name: Build Tauri app
        run: bun tauri build
        env:
          CI: "true"

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/*.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Tauri Release ${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
