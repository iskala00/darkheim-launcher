stages:
  - publish

variables:
  GIT_DEPTH: "0"

sync_to_github:
  stage: publish
  image: alpine:latest
  before_script:
    - apk add --no-cache git openssh ca-certificates
  script:
    - git fetch origin main --tags
    - git checkout -B main origin/main

    - git remote remove github 2>/dev/null || true
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/iskala00/installer.git"

    - git push --force-with-lease github main:main
    - git push github --tags
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'